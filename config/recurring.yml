# Recurring jobs (used when ACTIVE_JOB_ADAPTER=solid_queue).
# Permanently deletes users who were soft-deleted 30+ days ago.
production:
  cleanup_deleted_users:
    class: CleanupDeletedUsersJob
    schedule: "0 2 * * *"  # 2am daily (cron: min hour day month dow)
  checkout_reminder:
    class: CheckoutReminderJob
    schedule: "35 16 * * 1-5"  # 16:35 weekdays — "Did you check out?"
  auto_checkout:
    class: AutoCheckoutJob
    schedule: "59 23 * * *"  # 23:59 daily — force-close stale sessions
